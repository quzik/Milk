<script>
let customers = [];

// 1. Populate Month Selector (Fixed to trigger reload on change)
const monthSelect = document.getElementById("month");
const now = new Date();
for(let i=0; i<6; i++) {
    let d = new Date(now.getFullYear(), now.getMonth() - i, 1);
    let val = d.toISOString().slice(0,7); 
    monthSelect.innerHTML += `<option value="${val}">${val}</option>`;
}

// Reload data when the user changes the month
monthSelect.onchange = loadCustomers;

async function login() {
  const res = await fetch('/login', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'}, // Added missing header
    body: JSON.stringify({username: user.value, password: pass.value})
  });
  if(res.ok) {
    loadCustomers();
  } else {
    alert("Login Failed");
  }
}

async function loadCustomers() {
  // Only try to load if we have a session (or just handle 401s gracefully)
  const res = await fetch('/customers');
  if (!res.ok) return; // User might not be logged in yet
  
  customers = await res.json();
  
  const savedRes = await fetch(`/load?month=${monthSelect.value}`);
  const savedData = await savedRes.json();
  renderTable(savedData);
}

function renderTable(savedData = []) {
  const tbody = document.getElementById("tbody");
  
  tbody.innerHTML = customers.map(c => {
    // Find if this customer has saved data for the selected month
    const saved = savedData.find(s => s.customer_id === c.id) || { qty: 1, rate: 50 };
    
    return `
      <tr data-id="${c.id}">
        <td>${c.name}</td>
        <td><input type="number" class="qty" oninput="calc()" value="${saved.qty}"></td>
        <td><input type="number" class="rate" oninput="calc()" value="${saved.rate}"></td>
        <td><input type="checkbox" class="delivered" onchange="calc()" checked></td>
        <td class="total">0</td>
      </tr>`;
  }).join("");
  
  calc(); // Run initial calculation
}

function calc() {
  document.querySelectorAll("#tbody tr").forEach(tr => {
    const q = parseFloat(tr.querySelector(".qty").value) || 0;
    const r = parseFloat(tr.querySelector(".rate").value) || 0;
    const isDelivered = tr.querySelector(".delivered").checked;
    
    // Simple logic: If delivered is unchecked, total is 0 for that entry
    tr.querySelector(".total").innerText = (isDelivered ? (q * r) : 0).toFixed(2);
  });
}

async function save() {
  const rows = [...document.querySelectorAll("#tbody tr")].map(tr => ({
    customer_id: parseInt(tr.dataset.id),
    qty: tr.querySelector(".qty").value,
    rate: tr.querySelector(".rate").value,
    days: [tr.querySelector(".delivered").checked] // Simplified for now
  }));

  const res = await fetch('/save', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ month: monthSelect.value, rows })
  });

  if(res.ok) {
    alert("Data Saved Successfully!");
  } else {
    alert("Error saving data.");
  }
}
</script>

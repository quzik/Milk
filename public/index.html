<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Milk Management System</title>
    <style>
        :root { --primary: #2563eb; --danger: #dc2626; --bg: #f8fafc; --card: #ffffff; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); margin: 0; color: #1e293b; }
        .container { max-width: 900px; margin: 2rem auto; padding: 0 1rem; }
        .card { background: var(--card); padding: 1.5rem; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .hidden { display: none; }
        
        /* Form Styling */
        h2 { margin-top: 0; color: #0f172a; }
        input, select { width: 100%; padding: 0.75rem; margin: 0.5rem 0 1rem; border: 1px solid #cbd5e1; border-radius: 6px; box-sizing: border-box; }
        button { cursor: pointer; padding: 0.75rem 1.5rem; border-radius: 6px; border: none; font-weight: 600; transition: 0.2s; }
        .btn-primary { background: var(--primary); color: white; width: 100%; }
        .btn-primary:hover { background: #1d4ed8; }
        .btn-outline { background: transparent; border: 1px solid #cbd5e1; color: #64748b; }
        
        /* Dashboard Layout */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; }
        .logout-link { color: var(--danger); text-decoration: none; font-size: 0.9rem; cursor: pointer; }
        
        /* Table Styling */
        .table-container { overflow-x: auto; margin-top: 1rem; }
        table { width: 100%; border-collapse: collapse; background: white; }
        th { background: #f1f5f9; text-align: left; padding: 12px; border-bottom: 2px solid #e2e8f0; }
        td { padding: 12px; border-bottom: 1px solid #e2e8f0; }
        .input-small { width: 60px; padding: 4px; margin: 0; }
        
        .status-msg { padding: 10px; border-radius: 6px; margin-bottom: 1rem; font-size: 0.9rem; }
        .error { background: #fee2e2; color: #991b1b; }
        .success { background: #dcfce7; color: #166534; }
    </style>
</head>
<body>

<div class="container">
    <div id="login-view" class="card">
        <h2>Sign In</h2>
        <div id="login-error" class="status-msg error hidden"></div>
        <label>Username</label>
        <input type="text" id="username" placeholder="Enter username">
        <label>Password</label>
        <input type="password" id="password" placeholder="••••••••">
        <button class="btn-primary" onclick="doLogin()">Login</button>
    </div>

    <div id="app-view" class="hidden">
        <div class="header">
            <h2>Milk Dashboard</h2>
            <div>
                <span id="user-tag" style="margin-right:15px; font-weight:bold;"></span>
                <span class="logout-link" onclick="doLogout()">Logout</span>
            </div>
        </div>

        <div class="card" style="margin-bottom: 1rem; display: flex; gap: 10px; align-items: flex-end;">
            <div style="flex: 1;">
                <label>Select Month</label>
                <input type="month" id="view-month" style="margin:0;">
            </div>
            <button class="btn-outline" onclick="loadData()">Load Records</button>
            <button class="btn-primary" style="width:auto;" onclick="saveData()">Save Changes</button>
        </div>

        <div class="card">
            <div id="action-msg" class="status-msg hidden"></div>
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Customer</th>
                            <th>Qty</th>
                            <th>Rate</th>
                            <th>Received</th>
                            <th>Prev. Bal</th>
                        </tr>
                    </thead>
                    <tbody id="entry-table-body">
                        </tbody>
                </table>
            </div>
        </div>
        
        <div class="card" style="margin-top: 2rem;">
            <h3>Quick Add Customer</h3>
            <div style="display: flex; gap: 10px;">
                <input type="text" id="new-cust-name" placeholder="Name" style="margin:0;">
                <input type="number" id="new-cust-rate" placeholder="Rate" style="margin:0; width: 100px;">
                <button class="btn-outline" onclick="addCustomer()">Add</button>
            </div>
        </div>
    </div>
</div>

<script>
    // Configuration: Point this to your actual worker URL
    const API = "https://milk.mezz60606.workers.dev";
    
    // Set default month to current
    document.getElementById('view-month').value = new Date().toISOString().slice(0, 7);

    // --- Core Logic ---

    // 1. Initial Check: Are we logged in?
    async function checkSession() {
        try {
            const res = await fetch(`${API}/customers`, { credentials: "include" });
            if (res.ok) {
                const customers = await res.json();
                showDashboard(customers);
            } else {
                showLogin();
            }
        } catch (e) { showLogin(); }
    }

    // 2. Login Action
    async function doLogin() {
        const u = document.getElementById('username').value;
        const p = document.getElementById('password').value;
        const errDiv = document.getElementById('login-error');

        const res = await fetch(`${API}/login`, {
            method: "POST",
            body: JSON.stringify({ username: u, password: p }),
            credentials: "include"
        });

        const data = await res.json();
        if (data.success) {
            location.reload(); // Refresh to boot up dashboard
        } else {
            errDiv.innerText = data.error || "Login Failed";
            errDiv.classList.remove('hidden');
        }
    }

    // 3. Load Customer & Entry Data
    async function loadData() {
        const month = document.getElementById('view-month').value;
        
        // Fetch both customers and existing entries
        const [custRes, entryRes] = await Promise.all([
            fetch(`${API}/customers`, { credentials: "include" }),
            fetch(`${API}/load?month=${month}`, { credentials: "include" })
        ]);

        if (!custRes.ok) return doLogout();

        const customers = await custRes.json();
        const entries = await entryRes.json();

        const tbody = document.getElementById('entry-table-body');
        tbody.innerHTML = "";

        customers.forEach(c => {
            const e = entries.find(item => item.customer_id === c.id) || {};
            const row = `
                <tr data-id="${c.id}">
                    <td><strong>${c.name}</strong></td>
                    <td><input type="number" class="input-small qty" value="${e.qty || 0}"></td>
                    <td><input type="number" class="input-small rate" value="${e.rate || c.default_rate}"></td>
                    <td><input type="number" class="input-small received" value="${e.received || 0}"></td>
                    <td><input type="number" class="input-small bal" value="${e.old_balance || 0}"></td>
                </tr>
            `;
            tbody.insertAdjacentHTML('beforeend', row);
        });
    }

    // 4. Save Logic
    async function saveData() {
        const month = document.getElementById('view-month').value;
        const rows = [];
        
        document.querySelectorAll('#entry-table-body tr').forEach(tr => {
            rows.push({
                customer_id: parseInt(tr.dataset.id),
                qty: parseFloat(tr.querySelector('.qty').value),
                rate: parseFloat(tr.querySelector('.rate').value),
                received: parseFloat(tr.querySelector('.received').value),
                old_balance: parseFloat(tr.querySelector('.bal').value),
                days: {} // Placeholder for daily tracking
            });
        });

        const res = await fetch(`${API}/save`, {
            method: "POST",
            body: JSON.stringify({ month, rows }),
            credentials: "include"
        });

        if (res.ok) {
            notify("Data Saved Successfully!", "success");
        } else {
            notify("Error saving data", "error");
        }
    }

    // 5. Add Customer
    async function addCustomer() {
        const name = document.getElementById('new-cust-name').value;
        const rate = document.getElementById('new-cust-rate').value;
        
        if (!name) return;

        await fetch(`${API}/customer`, {
            method: "POST",
            body: JSON.stringify({ name, rate }),
            credentials: "include"
        });
        
        document.getElementById('new-cust-name').value = "";
        loadData();
    }

    // 6. Logout
    async function doLogout() {
        await fetch(`${API}/logout`, { credentials: "include" });
        location.reload();
    }

    // --- UI Helpers ---
    function showDashboard() {
        document.getElementById('login-view').classList.add('hidden');
        document.getElementById('app-view').classList.remove('hidden');
        loadData();
    }

    function showLogin() {
        document.getElementById('login-view').classList.remove('hidden');
        document.getElementById('app-view').classList.add('hidden');
    }

    function notify(text, type) {
        const msg = document.getElementById('action-msg');
        msg.innerText = text;
        msg.className = `status-msg ${type}`;
        setTimeout(() => msg.classList.add('hidden'), 3000);
    }

    // Startup
    checkSession();
</script>

</body>
</html>

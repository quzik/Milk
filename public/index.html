<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Milk Management Pro</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>

<style>
body {margin:0;font-family:Segoe UI;background:#f4f7f6;opacity:0;transition:0.4s;}
header{background:linear-gradient(135deg,#2c3e50,#3498db);color:white;padding:15px;text-align:center;font-weight:bold;}
.container{max-width:1200px;margin:auto;padding:10px;}
.card{background:white;padding:15px;margin:10px 0;border-radius:10px;box-shadow:0 3px 10px rgba(0,0,0,0.1);transition:0.3s;}
.card:hover{transform:translateY(-3px);}
.flex{display:flex;gap:10px;flex-wrap:wrap;align-items:center;}
input,select{padding:8px;border:1px solid #ddd;border-radius:6px;}
button{padding:8px 12px;border:none;border-radius:6px;font-weight:bold;cursor:pointer;transition:0.2s;}
button:hover{transform:scale(1.05);}
.green{background:#27ae60;color:white;}
.red{background:#e74c3c;color:white;}
.blue{background:#3498db;color:white;}
table{width:100%;border-collapse:collapse;min-width:1000px;}
th,td{border:1px solid #eee;padding:5px;text-align:center;}
th{background:#34495e;color:white;position:sticky;top:0;}
.sticky{position:sticky;left:0;background:#ecf0f1;font-weight:bold;}
#app{display:none;}
tr{animation:fade .2s;}
@keyframes fade{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>

<body>
<header>🥛 Milk Management Pro</header>

<div class="container">

<!-- LOGIN -->
<div class="card" id="loginBox">
<h3>Login</h3>
<input id="user" placeholder="Username"><br>
<input id="pass" type="password" placeholder="Password"><br><br>
<button class="green" onclick="login()">Login</button>
<p id="msg" style="color:red"></p>
</div>

<!-- APP -->
<div id="app">

<div class="card flex">
<input id="cname" placeholder="Customer Name">
<input id="crate" type="number" value="50">
<button class="green" onclick="addCustomer()">Add</button>
<input id="search" placeholder="Search..." oninput="filter()">
</div>

<div class="card flex">
<select id="month" onchange="load()"></select>
<button class="green" onclick="save()">Save</button>
<button class="blue" onclick="exportExcel()">Excel</button>
</div>

<div class="card" style="overflow:auto;max-height:70vh;">
<table>
<thead id="thead"></thead>
<tbody id="tbody"></tbody>
</table>
</div>

</div>
</div>

<script>
let customers=[];

const months=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
const m=document.getElementById("month");
months.forEach((x,i)=>m.add(new Option(x,i+1)));
m.value=new Date().getMonth()+1;

// LOGIN
async function login(){
let r=await fetch("/login",{method:"POST",headers:{"Content-Type":"application/json"},
body:JSON.stringify({username:user.value,password:pass.value})});
if(r.ok)location.reload();else msg.innerText="Wrong login";
}

// LOAD CUSTOMERS
async function loadCustomers(){
customers=await (await fetch("/customers")).json();
load();
}

// ADD
async function addCustomer(){
await fetch("/customer",{method:"POST",headers:{"Content-Type":"application/json"},
body:JSON.stringify({name:cname.value,rate:crate.value})});
cname.value="";
loadCustomers();
}

// DELETE
async function del(id){
await fetch("/customer",{method:"DELETE",headers:{"Content-Type":"application/json"},
body:JSON.stringify({id})});
loadCustomers();
}

// LOAD
async function load(){
let data=await (await fetch("/load?month="+m.value)).json();
render(data);
}

// RENDER
function render(data){
let days=new Date(2024,m.value,0).getDate();

let h="<tr><th>#</th><th class='sticky'>Name</th><th>Rate</th>";
for(let i=1;i<=days;i++)h+=`<th>${i}</th>`;
h+="<th>Total</th><th>Net</th><th>Action</th></tr>";
thead.innerHTML=h;

tbody.innerHTML=customers.map((c,i)=>{
let e=data.find(x=>x.customer_id==c.id)||{};
let arr=e.days?JSON.parse(e.days):Array(days).fill("");

return `<tr>
<td>${i+1}</td>
<td class="sticky">${c.name}</td>
<td><input value="${e.rate||c.default_rate||50}"></td>
${arr.map(v=>`<td><input value="${v||0}"></td>`).join("")}
<td>0</td>
<td>0</td>
<td><button class="red" onclick="del(${c.id})">X</button></td>
</tr>`;
}).join("");
}

// SAVE
async function save(){
let rows=[...document.querySelectorAll("tbody tr")].map(tr=>{
return{
customer_id:1,
rate:50,
days:[]
};
});
await fetch("/save",{method:"POST",headers:{"Content-Type":"application/json"},
body:JSON.stringify({month:m.value,rows})});
alert("Saved");
}

// FILTER
function filter(){
let t=search.value.toLowerCase();
document.querySelectorAll("tbody tr").forEach(r=>{
r.style.display=r.innerText.toLowerCase().includes(t)?"":"none";
});
}

// EXPORT
function exportExcel(){
let wb=XLSX.utils.table_to_book(document.querySelector("table"));
XLSX.writeFile(wb,"milk.xlsx");
}

// INIT
(async()=>{
let r=await fetch("/customers");
if(r.ok){
document.getElementById("loginBox").style.display="none";
document.getElementById("app").style.display="block";
customers=await r.json();
load();
}
document.body.style.opacity=1;
})();
</script>
</body>
</html>

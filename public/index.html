<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Milk Management Pro</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
<style>
body {
  margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f7f6; color: #333;
  opacity: 0; transition: opacity 0.5s ease-in;
}
header {
  background: linear-gradient(135deg, #3498db, #2ecc71); color: white; padding: 20px; text-align: center; font-weight: bold; font-size: 1.5em;
  box-shadow: 0 4px 6px rgba(0,0,0,0.1);
}
.container { padding: 15px; max-width: 1200px; margin: auto; }
.card {
  background: white; padding: 20px; margin-bottom: 15px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1);
  transition: transform 0.3s, box-shadow 0.3s;
}
.card:hover { transform: translateY(-5px); box-shadow: 0 8px 20px rgba(0,0,0,0.15); }
input, select {
  padding: 10px; margin: 5px 0; border:1px solid #ddd; border-radius: 6px; box-sizing:border-box; transition: transform 0.2s;
}
input:focus, select:focus { transform: scale(1.02); border-color: #3498db; outline: none; }
button {
  padding: 10px 15px; border: none; border-radius: 6px; cursor:pointer; font-weight:bold; transition: transform 0.2s, box-shadow 0.2s;
}
button:hover { transform: scale(1.05); box-shadow: 0 2px 6px rgba(0,0,0,0.2); }
.btn-red { background:#e74c3c; color:white; }
.btn-blue { background:#3498db; color:white; }
.btn-green { background:#27ae60; color:white; }
.flex-row { display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
.table-wrapper { overflow-x:auto; max-height:60vh; border:1px solid #eee; border-radius:8px; }
table { width:100%; border-collapse:collapse; min-width:1200px; font-size:13px; }
th, td { border:1px solid #eee; padding:6px; text-align:center; white-space:nowrap; }
th { background:#34495e; color:white; position: sticky; top:0; z-index:2; }
.sticky-col { position: sticky; left:0; background:#ecf0f1; font-weight:bold; z-index:3; border-right:2px solid #ccc; }
.litre-input { width:40px; text-align:center; border-radius:6px; border:1px solid #ccc; transition: 0.2s; }
.litre-input:focus { transform: scale(1.1); background:#e8f0fe; }
.editable-name { cursor:text; font-weight:bold; }
tr { animation: fadeIn 0.4s ease; }
@keyframes fadeIn { from {opacity:0; transform: translateY(5px);} to {opacity:1; transform:translateY(0);} }
#app { display:none; }
#loader { display:none; color:#2980b9; font-weight:bold; margin-left:10px; }
</style>
</head>
<body>
<header>🥛 Milk Management Pro</header>
<div class="container">
  <div class="card" id="loginBox">
    <h3>Login</h3>
    <input id="user" placeholder="Username" class="w-100">
    <input id="pass" type="password" placeholder="Password" class="w-100">
    <button class="w-100 btn-green" onclick="login()">Login</button>
    <div id="msg" style="color:red; margin-top:10px;"></div>
  </div>
  
  <div id="app">
    <div class="card flex-row" style="justify-content:space-between;">
      <h3 style="margin:0;">Dashboard</h3>
      <button class="btn-red" onclick="logout()">Logout</button>
    </div>
    <div class="card flex-row">
      <input id="cname" placeholder="Customer Name">
      <input id="crate" type="number" value="50" placeholder="Rate/L">
      <button class="btn-green" onclick="addCustomer()">Add Customer</button>
      <input id="searchBox" placeholder="🔍 Search Customer" oninput="filterTable()" style="margin-left:auto;">
    </div>
    <div class="card">
      <div class="flex-row" style="justify-content:space-between">
        <div class="flex-row">
          <select id="monthSelect" onchange="loadEntries()"></select>
          <button class="btn-green" onclick="save()">💾 Save</button>
          <span id="loader">Saving...</span>
        </div>
        <button class="btn-blue" onclick="exportExcel()">📊 Export Excel</button>
      </div>
      <div class="table-wrapper">
        <table id="dataTable">
          <thead id="thead"></thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>
<script>
// Full JavaScript logic goes here: login, logout, add/update/delete customer, load/render table, calc formulas, save, export Excel
</script>
<script>
document.addEventListener("DOMContentLoaded",()=>{document.body.style.opacity=1;});
</script>
</body>
</html>

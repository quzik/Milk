<script>
let customers = [];

// Populate Month Selector with real dates
const monthSelect = document.getElementById("month");
const now = new Date();
for(let i=0; i<6; i++) {
    let d = new Date(now.getFullYear(), now.getMonth() - i, 1);
    let val = d.toISOString().slice(0,7); // "2024-05"
    monthSelect.innerHTML += `<option value="${val}">${val}</option>`;
}

async function login() {
  const res = await fetch('/login', {
    method: 'POST',
    body: JSON.stringify({username: user.value, password: pass.value})
  });
  if(res.ok) {
    loadCustomers();
  } else {
    alert("Login Failed");
  }
}

async function loadCustomers() {
  const res = await fetch('/customers');
  customers = await res.json();
  // Check if we have saved data for this month
  const savedRes = await fetch(`/load?month=${monthSelect.value}`);
  const savedData = await savedRes.json();
  renderTable(savedData);
}

function renderTable(savedData = []) {
  const tbody = document.getElementById("tbody");
  tbody.innerHTML = customers.map(c => {
    const saved = savedData.find(s => s.customer_id === c.id) || { qty: 1, rate: 50 };
    return `
      <tr data-id="${c.id}">
        <td>${c.name}</td>
        <td><input type="number" class="qty" value="${saved.qty}"></td>
        <td><input type="number" class="rate" value="${saved.rate}"></td>
        <td><input type="checkbox" class="delivered" checked></td>
        <td class="total">0</td>
      </tr>`;
  }).join("");
  calc();
}

function calc() {
  document.querySelectorAll("#tbody tr").forEach(tr => {
    const q = +tr.querySelector(".qty").value || 0;
    const r = +tr.querySelector(".rate").value || 0;
    const isDelivered = tr.querySelector(".delivered").checked;
    tr.querySelector(".total").innerText = isDelivered ? (q * r) : 0;
  });
}

async function save() {
  const rows = [...document.querySelectorAll("#tbody tr")].map(tr => ({
    customer_id: parseInt(tr.dataset.id),
    qty: tr.querySelector(".qty").value,
    rate: tr.querySelector(".rate").value,
    days: [tr.querySelector(".delivered").checked]
  }));

  await fetch('/save', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ month: monthSelect.value, rows })
  });
  alert("Data Saved Successfully!");
}
</script>
